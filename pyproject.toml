[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    "migrations",
    "venv",
    ".venv",
    "static",
]

[tool.ruff.lint]
select = ["E", "W", "F"]  # ошибки и базовый PEP8
ignore = [
    "E501",  # если пока не хочешь ругаться на длину строк
]

[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    migrations
  | venv
  | \.venv
  | static
)/
'''