[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    "migrations",
    "venv",
    ".venv",
    "static",
]

[tool.ruff.lint]
select = ["E", "W", "F"]
ignore = [
    "E501",
]

[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    migrations
  | venv
  | \.venv
  | static
)/
'''